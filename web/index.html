<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReelForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text2: #888;
      --accent: #E8FF00;
      --accent-dim: rgba(232, 255, 0, 0.15);
      --red: #ff4d4d;
      --green: #4dff88;
      --radius: 10px;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }

    .health-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text2);
      display: inline-block;
      margin-right: 6px;
      transition: background 0.3s;
    }
    .health-dot.ok { background: var(--green); }
    .health-dot.err { background: var(--red); }

    .health-label {
      font-size: 12px;
      color: var(--text2);
      display: flex;
      align-items: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 14px;
    }

    /* ── File picker ── */
    .file-picker-label {
      font-size: 12px; color: var(--text2); margin-bottom: 6px;
      font-weight: 500; display: flex; align-items: center; justify-content: space-between;
    }
    .file-picker-label .input-dir {
      font-family: "SF Mono", "Fira Code", monospace; font-size: 11px; color: var(--text2); opacity: 0.7;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50%;
    }

    .file-list {
      list-style: none; border: 1px solid var(--border); border-radius: 8px;
      max-height: 160px; overflow-y: auto; margin-bottom: 10px;
    }
    .file-list:empty::after {
      content: "No video files in input directory";
      display: block; padding: 20px; text-align: center; color: var(--text2); font-size: 13px;
    }
    .file-list li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background 0.15s; font-size: 12px;
    }
    .file-list li:last-child { border-bottom: none; }
    .file-list li:hover { background: var(--surface2); }
    .file-list li.selected { background: var(--accent-dim); border-color: var(--accent); }
    .file-list li .file-name {
      color: var(--text); font-weight: 500; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px;
    }
    .file-list li .file-size {
      color: var(--text2); font-size: 12px;
      font-family: "SF Mono", "Fira Code", monospace; white-space: nowrap;
    }

    .path-input-row { display: flex; gap: 8px; align-items: center; }
    .path-input {
      flex: 1; min-width: 0; padding: 8px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-size: 12px; font-family: "SF Mono", "Fira Code", monospace;
    }
    .path-input:focus { outline: none; border-color: var(--accent); }
    .path-input::placeholder { color: var(--text2); opacity: 0.5; }

    .btn-refresh {
      padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text2); font-size: 14px; cursor: pointer;
      transition: border-color 0.2s; flex-shrink: 0;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--text); }

    /* ── Options ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
    .field select {
      width: 100%; padding: 8px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-size: 13px; appearance: none; cursor: pointer;
    }
    .field select:focus { outline: none; border-color: var(--accent); }

    .toggle-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--surface2);
      border-radius: 11px; border: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
    }
    .toggle-track::after {
      content: ""; position: absolute; width: 16px; height: 16px; border-radius: 50%;
      background: var(--text2); top: 2px; left: 2px; transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent-dim); border-color: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(18px); background: var(--accent); }
    .toggle-label { font-size: 12px; color: var(--text2); }

    /* ── Button ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      width: 100%; margin-top: 14px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    /* ── Jobs list ── */
    .jobs-list { list-style: none; }

    .job-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .job-item:last-child { border-bottom: none; }

    .job-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }

    .job-id {
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text); font-size: 11px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; margin-right: 8px;
    }

    .job-stage {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .job-stage.complete { background: rgba(77, 255, 136, 0.12); color: var(--green); }
    .job-stage.error { background: rgba(255, 77, 77, 0.12); color: var(--red); }
    .job-stage.render, .job-stage.analyse, .job-stage.transcribe, .job-stage.ingest {
      background: var(--accent-dim); color: var(--accent);
    }

    .job-progress-track {
      width: 100%; height: 4px; background: var(--surface2);
      border-radius: 2px; overflow: hidden; margin: 8px 0 6px;
    }
    .job-progress-fill {
      height: 100%; border-radius: 2px; transition: width 0.4s ease;
      background: var(--accent);
    }
    .job-progress-fill.complete { background: var(--green); }
    .job-progress-fill.error { background: var(--red); }

    .job-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--text2);
    }

    .job-message { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .job-actions { display: flex; gap: 12px; align-items: center; flex-shrink: 0; margin-left: 12px; }

    .job-cancel {
      background: none; border: 1px solid var(--red); color: var(--red);
      padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .job-cancel:hover { background: rgba(255, 77, 77, 0.1); }

    .job-download {
      color: var(--accent); text-decoration: none; font-weight: 600; font-size: 12px;
    }
    .job-download:hover { text-decoration: underline; }

    .btn-clear-all {
      background: none; border: none; color: var(--text2); font-size: 11px;
      cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: color 0.15s;
    }
    .btn-clear-all:hover { color: var(--text); }

    .job-dismiss {
      background: none; border: none; color: var(--text2); font-size: 14px;
      cursor: pointer; padding: 0 4px; line-height: 1; transition: color 0.15s;
    }
    .job-dismiss:hover { color: var(--text); }

    .empty-state {
      color: var(--text2); font-size: 13px; text-align: center; padding: 24px 0;
    }

    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    /* Compact tray mode */
    @media (max-width: 420px) {
      .shell { padding: 14px 12px; }
      .card { padding: 12px; margin-bottom: 10px; }
      .card h2 { font-size: 11px; margin-bottom: 10px; }
      header { margin-bottom: 14px; }
      header h1 { font-size: 16px; }
      .file-list { max-height: 120px; }
      .file-list li { padding: 6px 10px; font-size: 11px; }
      .file-picker-label { font-size: 11px; }
      .file-picker-label .input-dir { display: none; }
      .path-input { font-size: 11px; padding: 6px 8px; }
      .btn-refresh { padding: 6px 10px; font-size: 12px; }
      .options-grid { gap: 8px; margin-top: 10px; }
      .field select { padding: 6px 8px; font-size: 12px; }
      .toggle-row { margin-top: 8px; }
      .btn { padding: 8px 16px; font-size: 12px; margin-top: 10px; }
      .job-item { padding: 8px 0; }
      .job-id { font-size: 10px; }
      .job-stage { font-size: 10px; padding: 2px 8px; }
      .job-footer { font-size: 11px; }
      .job-cancel { font-size: 10px; padding: 2px 8px; }
      .empty-state { padding: 16px 0; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Reel<span>Forge</span></h1>
      <div class="health-label">
        <span class="health-dot" id="healthDot"></span>
        <span id="healthText">connecting...</span>
      </div>
    </header>

    <!-- New Reel -->
    <div class="card">
      <h2>New Reel</h2>

      <div class="file-picker-label">
        <span>Select video</span>
        <span class="input-dir" id="inputDirLabel"></span>
      </div>
      <ul class="file-list" id="fileList"></ul>

      <div class="path-input-row">
        <input type="text" class="path-input" id="pathInput" placeholder="Or type a full file path...">
        <button class="btn-refresh" id="refreshBtn" title="Refresh file list">&#8635;</button>
      </div>

      <div class="options-grid">
        <div class="field">
          <label>Preset</label>
          <select id="preset">
            <option value="instagramReel">Instagram Reel (9:16)</option>
            <option value="youtubeShort">YouTube Short (9:16)</option>
            <option value="instagramSquare">Instagram Square (1:1)</option>
            <option value="landscape">Landscape (16:9)</option>
          </select>
        </div>
        <div class="field">
          <label>Caption Style</label>
          <select id="captionStyle">
            <option value="highlight">Highlight</option>
            <option value="bounce">Bounce</option>
            <option value="typewriter">Typewriter</option>
            <option value="minimal">Minimal</option>
          </select>
        </div>
      </div>

      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="noCuts">
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label">Skip AI editing (captions only, no cuts)</span>
      </div>

      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="autoWatch" checked>
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label">Auto-process new files in input folder</span>
      </div>

      <button class="btn btn-primary" id="renderBtn" disabled>
        Render Reel
      </button>
    </div>

    <!-- Jobs -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h2 style="margin-bottom:0">Jobs</h2>
        <button class="btn-clear-all" id="clearAllBtn">Clear finished</button>
      </div>
      <ul class="jobs-list" id="jobsList">
        <li class="empty-state">No jobs yet</li>
      </ul>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let selectedPath = "";

    const fileList = document.getElementById("fileList");
    const pathInput = document.getElementById("pathInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const inputDirLabel = document.getElementById("inputDirLabel");
    const renderBtn = document.getElementById("renderBtn");
    const jobsList = document.getElementById("jobsList");
    const healthDot = document.getElementById("healthDot");
    const healthText = document.getElementById("healthText");
    const autoWatchToggle = document.getElementById("autoWatch");

    // ── Health ──
    async function checkHealth() {
      try {
        const r = await fetch(`${API}/health`);
        const d = await r.json();
        healthDot.className = "health-dot ok";
        healthText.textContent = `${d.activeJobs} active job${d.activeJobs !== 1 ? "s" : ""}`;
      } catch {
        healthDot.className = "health-dot err";
        healthText.textContent = "offline";
      }
    }
    checkHealth();
    setInterval(checkHealth, 10000);

    // ── Auto-watch toggle ──
    async function loadAutoWatch() {
      try {
        const r = await fetch(`${API}/auto-watch`);
        const d = await r.json();
        autoWatchToggle.checked = d.autoWatch;
      } catch {}
    }
    loadAutoWatch();

    autoWatchToggle.addEventListener("change", async () => {
      try {
        await fetch(`${API}/auto-watch`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: autoWatchToggle.checked }),
        });
      } catch {}
    });

    // ── File list ──
    async function loadFiles() {
      try {
        const res = await fetch(`${API}/files`);
        const data = await res.json();
        inputDirLabel.textContent = data.inputDir;

        if (data.files.length === 0) {
          fileList.innerHTML = "";
          return;
        }

        fileList.innerHTML = data.files.map((f) =>
          `<li data-path="${f.path}">
            <span class="file-name">${f.name}</span>
            <span class="file-size">${f.sizeMb} MB</span>
          </li>`
        ).join("");

        fileList.querySelectorAll("li").forEach((li) => {
          li.addEventListener("click", () => {
            fileList.querySelectorAll("li").forEach((l) => l.classList.remove("selected"));
            li.classList.add("selected");
            selectedPath = li.dataset.path;
            pathInput.value = selectedPath;
            renderBtn.disabled = false;
          });
        });
      } catch {
        fileList.innerHTML = "";
      }
    }
    loadFiles();
    refreshBtn.addEventListener("click", loadFiles);

    pathInput.addEventListener("input", () => {
      selectedPath = pathInput.value.trim();
      renderBtn.disabled = !selectedPath;
      fileList.querySelectorAll("li").forEach((l) => {
        l.classList.toggle("selected", l.dataset.path === selectedPath);
      });
    });

    // ── Render — always available, queues a new job ──
    renderBtn.addEventListener("click", async () => {
      if (!selectedPath) return;

      renderBtn.disabled = true;
      renderBtn.textContent = "Starting...";

      try {
        const res = await fetch(`${API}/render`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            inputPath: selectedPath,
            preset: document.getElementById("preset").value,
            captionStyle: document.getElementById("captionStyle").value,
            noCuts: document.getElementById("noCuts").checked,
          }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Request failed");
        }

        // Job accepted — re-enable immediately for next render
        renderBtn.disabled = false;
        renderBtn.textContent = "Render Reel";
        refreshJobs();
      } catch (err) {
        alert(err.message);
        renderBtn.disabled = false;
        renderBtn.textContent = "Render Reel";
      }
    });

    // ── Cancel a job ──
    async function cancelJob(jobId) {
      try {
        await fetch(`${API}/cancel/${jobId}`, { method: "POST" });
        refreshJobs();
      } catch {}
    }

    // ── Clear jobs ──
    async function clearJob(jobId) {
      try {
        await fetch(`${API}/jobs/${jobId}`, { method: "DELETE" });
        refreshJobs();
      } catch {}
    }

    document.getElementById("clearAllBtn").addEventListener("click", async () => {
      try {
        await fetch(`${API}/jobs`, { method: "DELETE" });
        refreshJobs();
      } catch {}
    });

    // ── Jobs — renders all progress inline ──
    async function refreshJobs() {
      try {
        const res = await fetch(`${API}/jobs`);
        const jobs = await res.json();

        if (jobs.length === 0) {
          jobsList.innerHTML = '<li class="empty-state">No jobs yet</li>';
          return;
        }

        jobsList.innerHTML = jobs.map((j) => {
          const elapsed = j.completedAt
            ? `${Math.round((j.completedAt - j.startedAt) / 1000)}s`
            : `${Math.round((Date.now() - j.startedAt) / 1000)}s`;

          const isActive = !["complete", "error"].includes(j.stage);
          const outName = j.outputPath ? j.outputPath.split("/").pop() : null;

          const progressBar = isActive
            ? `<div class="job-progress-track">
                <div class="job-progress-fill" style="width:${j.progress}%"></div>
              </div>`
            : j.stage === "complete"
              ? `<div class="job-progress-track">
                  <div class="job-progress-fill complete" style="width:100%"></div>
                </div>`
              : `<div class="job-progress-track">
                  <div class="job-progress-fill error" style="width:100%"></div>
                </div>`;

          const actions = [];
          if (isActive) {
            actions.push(`<button class="job-cancel" onclick="cancelJob('${j.id}')">Cancel</button>`);
          }
          if (j.stage === "complete" && outName) {
            actions.push(`<a class="job-download" href="${API}/output/${encodeURIComponent(outName)}" download>Download</a>`);
          }
          if (!isActive) {
            actions.push(`<button class="job-dismiss" onclick="clearJob('${j.id}')" title="Dismiss">&times;</button>`);
          }

          const message = j.stage === "error"
            ? `<span style="color:var(--red)">${j.error || j.message}</span>`
            : j.message || "";

          return `<li class="job-item">
            <div class="job-header">
              <span class="job-id">${j.id}</span>
              <span class="job-stage ${j.stage}">${j.stage}</span>
            </div>
            ${progressBar}
            <div class="job-footer">
              <span class="job-message">${message}</span>
              <span class="job-actions">
                <span>${elapsed}</span>
                ${actions.join("")}
              </span>
            </div>
          </li>`;
        }).join("");
      } catch {}
    }
    refreshJobs();
    setInterval(refreshJobs, 1500);
  </script>
</body>
</html>
